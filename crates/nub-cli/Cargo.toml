[package]
name = "nub-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "nub"
path = "src/main.rs"

[dependencies]
nub-core = { path = "../nub-core" }
# Vendored aube (vendor/aube git submodule, nubjs/aube fork). Linkage spike:
# first real path dep across the nub<->aube workspace boundary; aube-lockfile
# is a pure library crate (no CLI/tokio surface). See vendor/aube/AGENTS.md.
aube-lockfile = { path = "../../vendor/aube/crates/aube-lockfile" }
anyhow.workspace = true
clap.workspace = true
dotenvy = "0.15"
serde_json.workspace = true
semver = "1"
sha2.workspace = true
tracing.workspace = true
tempfile = "3"
tracing-subscriber.workspace = true
