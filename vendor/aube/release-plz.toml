# release-plz configuration.
#
# Two workflow modes (see `.github/workflows/release-plz.yml`):
#   * `release-pr` on every push to `main` — opens/updates a "chore: release"
#     PR that bumps the workspace version and regenerates CHANGELOG.md.
#   * `release` after that PR merges — publishes each crate to crates.io in
#     dependency order and creates a single draft GitHub release for the
#     binary under the `aube` crate's tag.
#
# Draft releases become non-drafts only after the binary-upload workflow
# finishes — see the `publish-release` job in `release-plz.yml`.

[workspace]
# The whole workspace shares one version (`version.workspace = true`),
# so we only want ONE GitHub release and ONE tag per cut — the crate
# ("aube") that owns the binary. Every other crate publishes to
# crates.io but is otherwise silent (no per-crate tag, no per-crate
# GitHub release).
publish = true
changelog_update = true
git_tag_enable = false
git_release_enable = false

[[package]]
name = "aube"
# aube owns the binary and the user-facing release; this crate alone
# gets the short `v{{ version }}` tag plus a draft GitHub release.
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
git_release_draft = true
git_release_name = "v{{ version }}"
