name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full cross-OS matrix at 06:00 UTC (offset from the lockfile-roundtrip
    # nightly at 07:00 and pnpm-conformance at 08:00). PR pushes run a Linux-gated
    # matrix (plus one Windows representative) to avoid saturating the macOS-5
    # concurrent-runner cap during busy PR waves; the full os × node cross-product
    # runs here and on push:main, so cross-platform regressions are still caught —
    # just on trunk/nightly rather than per-PR. See the `test`/`pnp` jobs for the
    # exact PR-vs-trunk split (driven by the `matrix-plan` job below).
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Emit the os × node matrices for the `test` and `pnp` jobs, varying by event:
  #   pull_request → Linux legs (full Node-version tier matrix) + ONE windows-latest
  #                  representative (the only place cfg(windows) PM-shim / PnP-path
  #                  code compiles + runs). macOS is dropped from PRs entirely — it
  #                  is the macOS-5-concurrent bottleneck.
  #   push:main / schedule (nightly) / any other event → the FULL matrix: ubuntu +
  #                  windows-latest + macos-14 on the current Node line, plus the
  #                  Linux-only tier representatives. This is where cross-OS (incl.
  #                  macOS) coverage is proven.
  # One job emitting JSON consumed via fromJSON keeps the split in a single place
  # instead of duplicating workflow files or hand-maintaining parallel matrices.
  matrix-plan:
    name: Plan matrices
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.plan.outputs.test }}
      pnp: ${{ steps.plan.outputs.pnp }}
    steps:
      - id: plan
        shell: bash
        run: |
          set -euo pipefail
          # The Linux Node-version tier legs are common to PR and trunk (compat
          # divergences are runtime-version-specific, not OS-specific). The
          # current-line cross-OS legs differ: PR keeps ubuntu + ONE windows;
          # trunk/nightly adds macos-14.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            test_os='[{"os":"ubuntu-latest","node":"24"},{"os":"windows-latest","node":"24"}]'
            pnp_os='[{"os":"ubuntu-latest","node":"24"},{"os":"windows-latest","node":"24"}]'
          else
            test_os='[{"os":"ubuntu-latest","node":"24"},{"os":"windows-latest","node":"24"},{"os":"macos-14","node":"24"}]'
            pnp_os='[{"os":"ubuntu-latest","node":"24"},{"os":"windows-latest","node":"24"},{"os":"macos-14","node":"24"}]'
          fi
          # Linux-only Node-version tier representatives (same on PR and trunk).
          test_tiers='[{"os":"ubuntu-latest","node":"22.15"},{"os":"ubuntu-latest","node":"22.13"},{"os":"ubuntu-latest","node":"20.11"},{"os":"ubuntu-latest","node":"18.19"}]'
          pnp_tiers='[{"os":"ubuntu-latest","node":"22.15"},{"os":"ubuntu-latest","node":"18.19"}]'
          test=$(jq -cn --argjson a "$test_os" --argjson b "$test_tiers" '{include: ($a + $b)}')
          pnp=$(jq -cn --argjson a "$pnp_os" --argjson b "$pnp_tiers" '{include: ($a + $b)}')
          echo "test=$test" >> "$GITHUB_OUTPUT"
          echo "pnp=$pnp" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # nub-cli has a path dependency into the vendored aube workspace
      # (vendor/aube, a submodule), so every job that resolves the cargo
      # dependency graph needs this one submodule present. Explicit
      # single-path init on purpose — `submodules: true` on the checkout
      # would also pull tests/node-suite (the full nodejs/node clone),
      # which these jobs deliberately exclude. `fmt` is exempt: cargo fmt
      # tolerates a missing path dep (verified — it never resolves deps).
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
      # Real Windows compile + test coverage is the windows-latest leg of the
      # `test` job. The previous fast `x86_64-pc-windows-gnu` cross-check needed
      # mingw-w64 + ring's C build, which was fragile on the runner; the native
      # Windows leg is the source of truth, so the cross-check is dropped.

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # vendor/aube path dep — see the `check` job for the rationale.
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }}, node ${{ matrix.node }})
    needs: matrix-plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-plan.outputs.test) }}
      # The matrix is computed by the matrix-plan job. On pull_request: ubuntu
      # (full Node-version tier matrix) + ONE windows-latest representative;
      # macOS is dropped from PRs (the macOS-5 concurrency bottleneck). On
      # push:main / nightly schedule: the FULL matrix adds macos-14.
      #
      # macos-14 is Apple Silicon (arm64) — the primary dev platform and the
      # darwin-arm64 release target (A24). It runs on trunk/nightly only.
      # darwin-x64 is built in release.yml but not yet exercised here; add
      # macos-13 (Intel) if x64 coverage is wanted later.
      #
      # The windows-latest leg is the ONLY place the PM-shim's cfg(windows)
      # code executes (Docker on the dev box is Linux-only): `cargo test`
      # picks up nub-cli's tests/pm_shim_windows.rs, which covers
      # install_shims_into's `.exe` entry naming, argv0 dispatch through a
      # pnpm.exe/npm.exe link, the `.exe`/`.cmd` PATH probing of the
      # fall-through scan, the pinned-PM cached run under the project Node,
      # the strict refusal, and exit-code fidelity through the spawn+wait
      # exec replacement. (The portable pm::shim unit tests — decision
      # matrix, profile-block edits, lockfile/redirect logic — already ran
      # here; the #[cfg(unix)] ones — inode/hardlink, exec-bit, symlink
      # tests and all of tests/pm_shim.rs — still don't.) Not covered
      # anywhere yet: replacing a RUNNING shim .exe (image lock), and a
      # `nub pm shim`/`unshim` round trip (dirs_next ignores env HOME on
      # Windows, so an end-to-end run would write the runner's real
      # profile — kept out deliberately). That genuinely-Windows-only code is
      # why one Windows leg is KEPT on PR rather than moved to trunk-only.
      #
      # This leg also compiles + runs the cfg(windows) arm of the
      # `nub upgrade` npm channel: the npm_upgrade_invocation_is_os_correct
      # unit test pins the Windows argv (`cmd /C npm install -g …`), which is
      # what fixes npm-channel upgrade on a plain Windows box (no `sh` there).
      # A real end-to-end `npm install -g` is left CI-dark on purpose — it
      # mutates global state and needs a published release.
      #
      # Node matrix spans the support range so the integration suite (which
      # nub runs against whatever `node` is first on PATH) exercises every
      # tier + capability boundary. 24 = current line; 22.15 = fast-path floor
      # (sync registerHooks); 22.13 = compat-tier top (async module.register,
      # has require(esm)+detect-module+webstorage); 20.11 = compat mid (NO
      # require(esm) — exercises the dynamic-import oxc-parser path — and NO
      # detect-module/webstorage, so it catches the version-gated flag
      # injection); 18.19 = the hard floor (no require(esm), no native `using`,
      # async tier). Compat divergences are runtime-version-specific, not
      # OS-specific, so the floor/compat legs run on Linux only (PR and trunk
      # alike) — a full os×node cross-product would multiply cost for no extra
      # signal.
    steps:
      # No node-suite submodule here: the fast unit + integration suite reads
      # only tests/fixtures, never tests/node-suite. The heavyweight Node-suite
      # compat corpus is #[ignore]'d (a CI-scale gate, not a unit test) — so
      # this job stays fast across the full os×node matrix, including the 22.15
      # floor where the using/ErrorEvent fallback paths are exercised by the
      # integration tests. vendor/aube is the one submodule that IS required
      # (path dep — see the `check` job).
      - uses: actions/checkout@v5
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      # Side-install the off-matrix tier representatives for the version_tiers
      # integration test (compat 22.13 and unsupported 18.18). actions/setup-node
      # only manages one PATH-active Node per job; these two go into private
      # dirs and are exposed to the test via TEST_NODE_BIN_<MAJOR>_<MINOR>_<PATCH>
      # — the env-var prefix deliberately avoids `NUB_*` (brand-boundary rule
      # applies even to test-only knobs). Linux-only because the tarball URL
      # paths differ per OS and the version_tiers contract is runtime-specific,
      # not OS-specific.
      - name: Install side Node binaries for version_tiers
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          install_node() {
            local ver="$1"
            local dest="$RUNNER_TEMP/node-v${ver}-linux-x64"
            if [ ! -x "$dest/bin/node" ]; then
              curl -fsSL "https://nodejs.org/dist/v${ver}/node-v${ver}-linux-x64.tar.xz" \
                | tar -xJ -C "$RUNNER_TEMP"
            fi
            echo "$dest/bin"
          }
          dir_22_13=$(install_node 22.13.0)
          dir_18_18=$(install_node 18.18.0)
          "$dir_22_13/node" --version
          "$dir_18_18/node" --version
          {
            echo "TEST_NODE_BIN_22_13_0=$dir_22_13"
            echo "TEST_NODE_BIN_18_18_0=$dir_18_18"
          } >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      # The data-format loader tests need the nub-native addon (the npm yaml/toml/
      # json5 parser fallback isn't a dev dep). Built in DEBUG, not release: the
      # tests only need the addon to LOAD (the loaders are exercised at runtime,
      # no release-only behavior is asserted), and `cargo test` below compiles
      # everything in debug — a release addon build recompiles the whole oxc
      # toolchain a second time per matrix cell for no test signal. The debug
      # artifacts are reused by `cargo test`.
      - name: Build nub-native addon (for data-format loader tests)
        shell: bash
        run: |
          cargo build -p nub-native
          mkdir -p runtime/addons
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/debug/nub_native.dll runtime/addons/nub-native.node
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cp target/debug/libnub_native.dylib runtime/addons/nub-native.node
          else
            cp target/debug/libnub_native.so runtime/addons/nub-native.node
          fi
      - run: cargo test
      # Brand-boundary sweep for the embedded PM engine: a real `nub install`
      # in a sandboxed fixture (HOME/XDG_* inside a temp dir) must never leak
      # the engine's upstream identity — no ERR_AUBE_/WARN_AUBE_/aube.jdx.dev
      # in output, AUBE_* env vars dead, no aube-named on-disk paths beyond the
      # documented shrinking allowlist in the script, and
      # npm_config_user_agent's first token == nub/<ver>. One leg is enough:
      # the assertions are OS- and Node-version-independent.
      - name: Brand sweep (embedded PM engine)
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        run: |
          cargo build -p nub-cli
          tests/brand-sweep/run.sh target/debug/nub

      # globalThis brand-boundary sweep for the RUNTIME: `nub <file>` must never put
      # a nub-named key on the user's globalThis, in the main realm OR a worker realm,
      # by enumerable OR own-property predicate. Regression guard for the floor-tier
      # `globalThis.__nubFloorCreateRequire` leak (enumerable, in both realms, on Node
      # < 22.3 where process.getBuiltinModule is absent — now threaded through module
      # scope). The test checks whatever `node` is on PATH (so the 18.19 leg here
      # exercises the FLOOR path, where the leak lived) and also sweeps any floor Node
      # under ~/.nvm. Run on the 18.19 floor leg AND the 24 fast leg to cover both
      # tiers; the contract is OS-independent so one OS suffices.
      - name: Brand sweep (globalThis runtime surface)
        if: matrix.os == 'ubuntu-latest' && (matrix.node == '18.19' || matrix.node == '24')
        run: |
          cargo build -p nub-cli
          tests/brand-global/run.sh target/debug/nub

  pnp:
    name: Yarn PnP (${{ matrix.os }}, node ${{ matrix.node }})
    needs: matrix-plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-plan.outputs.pnp) }}
      # Matrix computed by the matrix-plan job. Cross-OS coverage on the current
      # Node line matters here because PnP's zipfs fs patch, path handling, and
      # `findPnpApi` differ by OS (Windows backslashes especially), which the host
      # (macOS) + Docker (Linux) legs can't fully cover. On pull_request: ubuntu +
      # ONE windows-latest representative (the Windows-path divergence is the real
      # cross-OS risk); macos-14 runs on push:main / nightly schedule only.
      # Plus two Linux tier representatives on PR and trunk alike: 22.15 = fast-tier
      # floor (sync registerHooks), 18.19 = compat-tier floor (async loader worker).
      # Tiers are runtime-version specific, not OS-specific, so they run on Linux
      # only.
    steps:
      - uses: actions/checkout@v5
      # vendor/aube path dep — see the `check` job for the rationale.
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      # nub itself + the nub-native addon (the TS-under-PnP scenario transpiles, so
      # the addon must be present, same as the `test` job's data-format gate).
      - name: Build nub + native addon
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p nub-cli -p nub-native
          mkdir -p runtime/addons
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/debug/nub_native.dll runtime/addons/nub-native.node
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cp target/debug/libnub_native.dylib runtime/addons/nub-native.node
          else
            cp target/debug/libnub_native.so runtime/addons/nub-native.node
          fi
      # Builds a real Yarn 4 PnP fixture (corepack ships with Node) and runs every
      # PnP scenario against the in-runner Node. The matrix script is bash; Windows
      # runners provide Git Bash via `shell: bash`.
      - name: Run Yarn PnP matrix
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          NUB=target/debug/nub
          [[ "$RUNNER_OS" == "Windows" ]] && NUB=target/debug/nub.exe
          tests/pnp/run-pnp-matrix.sh "$NUB" "$(dirname "$(command -v node)")"

  # The heavyweight Node-suite compat corpus job was removed from CI (2026-06-03):
  # it regressed during the repo move and reproducibly kills the runner at parallel
  # fan-out, and isn't needed as a CI gate for now. nub still runs on byte-for-byte
  # stock Node, so compatibility is structurally preserved — this only drops the
  # automated corpus signal. Re-add it (root-caused/fixed) via node_compat.rs when
  # the runner-kill is understood.

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  types-fixtures:
    name: "@nubjs/types typecheck fixtures"
    runs-on: ubuntu-latest
    # Catches @nubjs/types declaration regressions: each fixture runs `tsc --noEmit`
    # and asserts the expected pass/fail. The package's index.d.ts is exercised
    # directly (installed as file:.. → symlinked), so a broken decl, a lost data-import
    # wildcard, an accidental module conversion (export {}), or a re-introduced lib.dom
    # `Worker` collision (TS2403/TS2430) fails here. Pure Node + tsc — no Rust toolchain,
    # no submodules, no native addon. Pinned tsc + @types/node in npm/nub-types/test.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install fixture deps (pinned tsc + @types/node + file:.. @nubjs/types)
        run: npm install --no-audit --no-fund
        working-directory: npm/nub-types/test
      - name: Run @nubjs/types typecheck fixtures
        run: node run.mjs
        working-directory: npm/nub-types/test
