name: Aube parity

# Upstream-parity gate for the vendored aube (vendor/aube — a submodule pinned
# to the nubjs/aube fork, branch nub-integration). Runs aube's OWN test suite
# with the same invocation upstream jdx/aube CI uses (`mise run test` =
# `cargo test`; their Windows leg spells it `cargo test --workspace`), so any
# nub-motivated change inside the vendor tree provably keeps upstream behavior
# intact — the doctrine is that everything in vendor/aube stays conceivably
# upstreamable.
#
# This is a separate workflow (not a job in ci.yml) because GitHub path filters
# only exist at the workflow level, and that makes the gating both correct and
# the cheapest available: the parity signal is a pure function of the submodule
# gitlink — nub-side commits can't change aube's own test results (the
# dependency direction is nub → aube; nothing in the superproject is visible
# inside vendor/aube's workspace) — so triggering on the gitlink path (plus
# .gitmodules and this file) costs zero runner minutes until the vendor pointer
# actually moves, with no dorny/paths-filter gate job burning a runner on every
# unrelated push. Push covers main + the aube-integration working branch;
# pull_request covers the eventual PR into main.
on:
  push:
    branches: [main, aube-integration]
    paths:
      # The submodule bump shows up in the superproject diff as the bare
      # gitlink path `vendor/aube` (no trailing slash, no files under it), so
      # that exact path — not `vendor/aube/**` — is the load-bearing filter.
      - "vendor/aube"
      - ".gitmodules"
      - ".github/workflows/aube-parity.yml"
      # tests/aube-bats/** is the nub-adapted harness (shim + skip lists) the
      # aube-bats-nub job runs; tests/aube-conformance/** is the real-PM
      # lockfile conformance harness the aube-conformance job runs.
      - "tests/aube-bats/**"
      - "tests/aube-conformance/**"
  pull_request:
    branches: [main]
    paths:
      - "vendor/aube"
      - ".gitmodules"
      - ".github/workflows/aube-parity.yml"
      - "tests/aube-bats/**"
      - "tests/aube-conformance/**"
  schedule:
    # Nightly at 06:30 UTC. The Windows conformance leg is gated off
    # pull_request (it is the only Windows-runner contributor in this workflow);
    # the nightly schedule keeps that Windows coverage running on a cadence even
    # between vendor/aube bumps. Scheduled runs ignore the path filters above and
    # exercise the full workflow, Windows leg included.
    - cron: "30 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  aube-parity:
    name: aube cargo test (ubuntu)
    # ubuntu-latest only for now; macOS legs come later (10×-billed runners,
    # same budgeting rationale as release.yml's linux_only debug mode).
    runs-on: ubuntu-latest
    # Upstream caps its linux test job at 30 minutes on a warm Namespace
    # runner; an uncached GitHub runner builds the whole workspace from
    # scratch, so give it headroom while still killing a hung test long
    # before the 6-hour default.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      # Init ONLY vendor/aube — never `submodules: true`, which would also
      # pull tests/node-suite (the full nodejs/node clone that every other
      # job here deliberately excludes).
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vendor/aube
      - name: Run aube's own test suite
        working-directory: vendor/aube
        run: cargo test --workspace
      # aube's own bats e2e (aube-as-aube, 4-way linux shards upstream) is
      # still not bolted on here — it needs mise-provisioned tooling. The
      # NUB-ADAPTED bats run below is a different animal: it needs only the
      # vendored bats + committed Verdaccio fixtures, with nub standing in
      # for aube.

  aube-bats-nub:
    name: aube bats, nub-adapted (ubuntu)
    # Runs the curated install-family subset of aube's own bats e2e suite
    # against NUB's PM surface (tests/aube-bats/run.sh: an `aube` shim that
    # exec's nub, the offline Verdaccio registry, and the two skip lists —
    # skips.txt for intended divergences, known-gaps.txt for in-flight
    # wiring). One ubuntu shard on purpose: the signal is PM-surface
    # behavior, not OS coverage.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Build nub
        run: cargo build -p nub-cli
      - name: Run aube bats suites against nub
        run: tests/aube-bats/run.sh target/debug/nub

  aube-conformance:
    name: lockfile conformance, real PMs (ubuntu)
    # nub writes each foreign lockfile format in a hermetic sandbox and the
    # REAL pinned package manager judges it (tests/aube-conformance/run.sh):
    # pnpm/npm frozen-accept + zero-churn rewrite, bun frozen-accept, and the
    # yarn-mutation refusal gate. pnpm and npm are exact-pinned inside the
    # runner via npx; bun is pinned here (keep in sync with BUN_PIN in
    # run.sh). Known-red scenarios live in expected-failures.txt and must
    # shrink — a stale entry fails the job. Real registry installs, one
    # ubuntu shard: the signal is lockfile semantics, not OS coverage.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Build nub
        run: cargo build -p nub-cli
      - name: Run lockfile conformance matrix
        run: tests/aube-conformance/run.sh target/debug/nub

  aube-conformance-windows:
    name: lockfile conformance, real PMs (windows)
    # Gated off pull_request to keep Windows runners off the PR hot path; runs on
    # push (main / aube-integration, on a vendor/aube bump) and the nightly
    # schedule. The Linux conformance legs above still gate every PR.
    if: github.event_name != 'pull_request'
    # Windows leg of the conformance matrix (the maintainer 2026-06-10). Budgeted
    # subset: the pnpm + npm judge legs over the simple, peer-heavy, and
    # workspace fixtures — the signal is lockfile semantics crossed with
    # Windows realities (path separators, junction/symlink linking, .exe
    # resolution, CRLF), not full OS × format coverage. bun, yarn, and the
    # nub round-trip legs stay ubuntu-only; the harness itself runs under
    # the runner's Git Bash (shell: bash) and sandboxes USERPROFILE/APPDATA
    # alongside HOME/XDG (see run.sh).
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      # The runner image ships core.autocrlf=true; that would CRLF-ify the
      # bash harness and the committed fixtures at checkout. Must precede
      # actions/checkout.
      - name: Force LF checkout
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v5
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Build nub
        run: cargo build -p nub-cli
      - name: Run lockfile conformance matrix (pnpm + npm judges)
        shell: bash
        env:
          FORMATS: pnpm npm
        run: tests/aube-conformance/run.sh target/debug/nub.exe simple peer-heavy workspace
