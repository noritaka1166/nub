name: Native-dep floor

# End-to-end test of nub's default-trust floor policy against real packages that
# compile native code or run postinstall download scripts.
#
# Two fixture legs:
#   floor-allowed: esbuild + better-sqlite3 (both on the allowlist). Asserts:
#     (a) install exits 0 and artifacts materialize,
#     (b) WARN_NUB_DEFAULT_TRUST_BUILDS discloses both packages by name — the
#         floor is NOT a silent allow path,
#     (c) native modules are loadable after install.
#   floor-denied:  core-js (not on the allowlist). Asserts:
#     WARN_NUB_IGNORED_BUILD_SCRIPTS names core-js — build is blocked.
#
# Why separate workflow: the harness does a real npm registry install of esbuild
# and better-sqlite3 (which compiles a C++ addon via node-gyp). That makes the
# job slow and network-dependent. A path filter fires it only when the PM engine
# or native-build path changed.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "vendor/aube"
      - "tests/native-deps/**"
      - ".github/workflows/native-deps.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "vendor/aube"
      - "tests/native-deps/**"
      - ".github/workflows/native-deps.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  native-deps:
    name: Native-dep floor (ubuntu)
    runs-on: ubuntu-latest
    # node-gyp compile (better-sqlite3) + real registry installs can be slow on cold runners.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Init vendor/aube submodule
        run: git submodule update --init vendor/aube
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # node-gyp requires a C++ compiler and Python 3; ubuntu-latest ships both.
      - name: Build nub + native addon
        shell: bash
        run: |
          cargo build -p nub-cli -p nub-native
          mkdir -p runtime/addons
          cp target/debug/libnub_native.so runtime/addons/nub-native.node
      - name: Run native-deps harness
        run: tests/native-deps/run.sh target/debug/nub
