name: Launcher heal

# Validates the POSIX self-heal launcher (npm/nub/bin/launch.js): the first call runs
# and rewrites the on-PATH bin entry (pnpm cmd-shim or npm/bun symlink) into a minimal
# sh/node polyglot trampoline -> native, later calls spawn ZERO node, nubx keeps its
# verb, a foreign `nub` is never clobbered, N concurrent first-calls hit 0 failures,
# and the 0o644 native is recovered (in-place chmod when owned, staged user-owned copy
# when not). The host legs run on ubuntu (dash) and macos (bash) against both PM shim
# shapes with a fake native (the heal is binary-agnostic); the non-owner staged-copy
# leg needs a privilege drop, so it runs in a Linux container. Windows is intentionally
# excluded: the heal is a no-op there (no shebang/symlink fast path), so Windows keeps
# the JS launcher (working-but-taxed by design) and is covered by the `npm install -g`
# smoke in release.yml / verify-install.yml. Full rationale + gaps: tests/launcher/README.md.

on:
  push:
    paths:
      - npm/nub/**
      - tests/launcher/**
      - .github/workflows/launcher.yml
  pull_request:
    paths:
      - npm/nub/**
      - tests/launcher/**
  schedule:
    # Nightly at 06:45 UTC. The macOS self-heal leg is gated off pull_request
    # (the macOS-5 concurrency bottleneck); the nightly schedule keeps that
    # coverage running on a cadence. Scheduled runs ignore the path filters and
    # run the full OS matrix.
    - cron: "45 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  heal:
    name: heal · ${{ matrix.os }}
    strategy:
      fail-fast: false
      # On pull_request: ubuntu only (the dash leg) — macOS is dropped from PRs
      # to stay off the macOS-5 concurrency bottleneck. On push / nightly
      # schedule / dispatch: ubuntu + macOS (the bash leg). The non-owner job
      # below (Linux container) gates every event including PRs.
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Host self-heal matrix (both PM shim shapes)
        run: bash tests/launcher/run-launcher-matrix.sh "$(dirname "$(command -v node)")"

  non-owner:
    name: non-owner staged copy · docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Non-owner staged-copy fallback (root install -> non-root run, no postinstall)
        run: bash tests/launcher/docker-non-owner.sh
